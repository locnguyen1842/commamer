name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  WAILS_VERSION: v3.0.0-alpha.74

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Add pnpm to PATH
        shell: bash
        run: |
          PNPM_HOME="${PNPM_HOME:-$HOME/.local/share/pnpm}"
          echo "$PNPM_HOME" >> $GITHUB_PATH
          echo "PNPM_HOME=$PNPM_HOME" >> $GITHUB_ENV

      - name: Install frontend deps
        run: cd frontend && pnpm install

      - name: Lint frontend
        run: cd frontend && pnpm lint
        continue-on-error: true

      - name: Cache Linux apt deps
        id: cache-apt-type
        uses: actions/cache@v4
        with:
          path: /tmp/apt-cache-type
          key: apt-ubuntu-latest-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Install Linux build deps
        run: |
          if [ -d /tmp/apt-cache-type ]; then
            sudo cp -r /tmp/apt-cache-type/*.deb /var/cache/apt/archives/ 2>/dev/null || true
          fi
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgtk-3-dev libwebkit2gtk-4.1-dev
          sudo mkdir -p /tmp/apt-cache-type
          sudo cp /var/cache/apt/archives/*.deb /tmp/apt-cache-type/ 2>/dev/null || true
          sudo chmod -R a+r /tmp/apt-cache-type

      - name: Create frontend/dist placeholder for go build
        run: mkdir -p frontend/dist && touch frontend/dist/.gitkeep

      - name: Go build check
        run: go build ./...

      - name: Cache Wails CLI
        id: cache-wails
        uses: actions/cache@v4
        with:
          path: |
            ~/go/bin/wails3
            ~/.go/bin/wails3
          key: wails3-${{ env.WAILS_VERSION }}-${{ runner.os }}

      - name: Install Wails v3 CLI
        if: steps.cache-wails.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Add Go bin to PATH
        run: echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Generate Wails bindings
        run: wails3 generate bindings -clean=true

      - name: TypeScript check
        run: cd frontend && pnpm tsc --noEmit

  build-check:
    name: Build check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
          - os: macos-latest
          - os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Add pnpm to PATH
        shell: bash
        run: |
          PNPM_HOME="${PNPM_HOME:-$HOME/.local/share/pnpm}"
          echo "$PNPM_HOME" >> $GITHUB_PATH
          echo "PNPM_HOME=$PNPM_HOME" >> $GITHUB_ENV

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Linux apt deps
        if: runner.os == 'Linux'
        id: cache-apt
        uses: actions/cache@v4
        with:
          path: /tmp/apt-cache
          key: apt-${{ matrix.os }}-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          if [ -d /tmp/apt-cache ]; then
            sudo cp -r /tmp/apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
          fi
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgtk-3-dev libwebkit2gtk-4.1-dev
          sudo mkdir -p /tmp/apt-cache
          sudo cp /var/cache/apt/archives/*.deb /tmp/apt-cache/ 2>/dev/null || true
          sudo chmod -R a+r /tmp/apt-cache

      - name: Cache Windows NSIS
        if: runner.os == 'Windows'
        id: cache-nsis
        uses: actions/cache@v4
        with:
          path: C:\Program Files (x86)\NSIS
          key: nsis-${{ runner.os }}

      - name: Install Windows NSIS
        if: runner.os == 'Windows' && steps.cache-nsis.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          choco install nsis --no-progress -y

      - name: Add NSIS to PATH
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $nsisPath = Get-ChildItem "C:\Program Files*\NSIS" -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($nsisPath) {
            echo $nsisPath.FullName | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          } else {
            echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

      - name: Cache Wails CLI
        id: cache-wails
        uses: actions/cache@v4
        with:
          path: |
            ~/go/bin/wails3
            ~/.go/bin/wails3
          key: wails3-${{ env.WAILS_VERSION }}-${{ runner.os }}

      - name: Install Wails v3 CLI
        if: steps.cache-wails.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Add Go bin to PATH
        shell: bash
        run: echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Install frontend deps
        run: cd frontend && pnpm install

      - name: Cache frontend build
        uses: actions/cache@v4
        with:
          path: |
            frontend/dist
            frontend/bindings
          key: frontend-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml', 'frontend/src/**', 'frontend/index.html', 'frontend/vite.config.*', 'frontend/tsconfig*.json', 'frontend/tailwind.config.*', '**/*.go', 'go.mod', 'go.sum') }}

      - name: Build
        run: task build
