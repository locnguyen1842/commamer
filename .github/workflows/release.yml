name: Build & Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.0.0) — used only for naming artifacts'
        required: false
        default: 'dev'

permissions:
  contents: write

env:
  WAILS_VERSION: v3.0.0-alpha.74

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact: cmdex-linux-amd64
          - os: macos-latest
            artifact: cmdex-darwin-universal
          - os: windows-latest
            artifact: cmdex-windows-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v5
        with:
          node-version: '25'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Add pnpm to PATH
        shell: bash
        run: |
          PNPM_HOME="${PNPM_HOME:-$HOME/.local/share/pnpm}"
          echo "$PNPM_HOME" >> $GITHUB_PATH
          echo "PNPM_HOME=$PNPM_HOME" >> $GITHUB_ENV

      - name: Verify pnpm installation
        run: pnpm --version

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: pnpm install

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Linux apt deps
        if: runner.os == 'Linux'
        id: cache-apt
        uses: actions/cache@v4
        with:
          path: /tmp/apt-cache
          key: apt-${{ matrix.os }}-${{ hashFiles('.github/workflows/release.yml') }}

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          if [ -d /tmp/apt-cache ]; then
            sudo cp -r /tmp/apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
          fi
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgtk-3-dev libwebkit2gtk-4.1-dev
          sudo mkdir -p /tmp/apt-cache
          sudo cp /var/cache/apt/archives/*.deb /tmp/apt-cache/ 2>/dev/null || true
          sudo chmod -R a+r /tmp/apt-cache

      - name: Cache Windows NSIS
        if: runner.os == 'Windows'
        id: cache-nsis
        uses: actions/cache@v4
        with:
          path: C:\Program Files (x86)\NSIS
          key: nsis-${{ runner.os }}

      - name: Install Windows NSIS
        if: runner.os == 'Windows' && steps.cache-nsis.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          choco install nsis --no-progress -y

      - name: Add NSIS to PATH
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $nsisPath = Get-ChildItem "C:\Program Files*\NSIS" -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($nsisPath) {
            echo $nsisPath.FullName | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          } else {
            echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

      - name: Cache Wails CLI
        id: cache-wails
        uses: actions/cache@v4
        with:
          path: |
            ~/go/bin/wails3
            ~/.go/bin/wails3
          key: wails3-${{ env.WAILS_VERSION }}-${{ runner.os }}

      - name: Install Wails v3 CLI
        if: steps.cache-wails.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Add Go bin to PATH
        shell: bash
        run: echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Cache frontend build
        uses: actions/cache@v4
        with:
          path: |
            frontend/dist
            frontend/bindings
          key: frontend-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml', 'frontend/src/**', 'frontend/index.html', 'frontend/vite.config.*', 'frontend/tsconfig*.json', 'frontend/tailwind.config.*', '**/*.go', 'go.mod', 'go.sum') }}

      - name: Package (tag release)
        if: startsWith(github.ref, 'refs/tags/')
        run: task ${{ runner.os == 'macOS' && 'package:universal' || 'package' }}

      - name: Build (dispatch / non-tag)
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: task build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}-${{ inputs.tag || 'untagged' }}
          path: |
            bin/*.AppImage
            bin/*.deb
            bin/*.rpm
            bin/*.dmg
            bin/*-installer.exe
          if-no-files-found: warn

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Flatten artifact directories
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec mv {} release-assets/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: false